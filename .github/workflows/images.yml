# Build the three control-plane container images and attach them to the GitHub
# release as versioned tarballs (#46). No registry: stormcos (zeroboot) preloads
# these into the node image store at build time, so a downloadable, immutable
# per-release artifact is exactly what's needed — and it avoids ghcr package
# permissions entirely. Load with `docker load` / `podman load` / `skopeo copy
# docker-archive:...`; the image inside is tagged rustkube-<component>:<version>.
name: images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag/ref to build (e.g. v0.7.34)'
        required: true

permissions:
  contents: write   # attach assets to the release

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Derive version tag
        id: ver
        run: echo "tag=${{ github.event.inputs.ref || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Build release binaries
        run: cargo build --release -p kube-apiserver -p kube-controller-manager -p kube-scheduler

      - uses: docker/setup-buildx-action@v3

      - name: Build image tarballs
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for c in kube-apiserver kube-controller-manager kube-scheduler; do
            comp="rustkube-${c#kube-}"                # rustkube-apiserver, …
            cp "target/release/$c" "./$c"
            docker build -f deploy/images/Dockerfile --build-arg "COMPONENT=$c" -t "$comp:$TAG" .
            docker save "$comp:$TAG" | gzip > "dist/$comp-$TAG.docker.tar.gz"
            rm -f "./$c"
            echo "saved dist/$comp-$TAG.docker.tar.gz"
          done
          ls -lh dist/

      - name: Attach tarballs to the release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          gh release view "$TAG" >/dev/null 2>&1 || gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" dist/*.docker.tar.gz --clobber
