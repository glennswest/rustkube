# Publish the three control-plane images to ghcr with IMMUTABLE version tags
# alongside :latest, on tag push — so stormcos (zeroboot) can pin an exact
# control plane into a boot image instead of a floating :latest (#46).
name: images

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      ref:
        description: 'Tag/ref to build (e.g. v0.7.34)'
        required: true

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Derive version tag
        id: ver
        run: |
          REF="${{ github.event.inputs.ref || github.ref_name }}"
          echo "tag=${REF}" >> "$GITHUB_OUTPUT"        # e.g. v0.7.34

      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binaries
        run: cargo build --release -p kube-apiserver -p kube-controller-manager -p kube-scheduler

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build + push each component (version + latest)
        env:
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          for c in kube-apiserver kube-controller-manager kube-scheduler; do
            img="ghcr.io/${{ github.repository_owner }}/rustkube-${c#kube-}"   # rustkube-apiserver, …
            cp "target/release/$c" "./$c"
            docker build -f deploy/images/Dockerfile --build-arg "COMPONENT=$c" \
              -t "$img:$TAG" -t "$img:latest" .
            docker push "$img:$TAG"
            docker push "$img:latest"
            rm -f "./$c"
            echo "pushed $img:$TAG and :latest"
          done
